name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Regenerate city pages and fail if out of date
        run: |
          node scripts/generate-city-pages.mjs
          git diff --exit-code -- app || (echo "::error::City pages are out of date with app/data/localSeo.ts. Run 'npm run generate:city-pages' and commit the result." && exit 1)

      - run: npx tsc --noEmit

      - run: npm run lint

      - run: npm run build
